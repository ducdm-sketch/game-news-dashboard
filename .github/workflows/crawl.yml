name: Game News Crawler

on:
  schedule:
    # Run every 6 hours (minute 0 past every 6th hour)
    - cron: '0 */6 * * *'
  workflow_dispatch: # Enable manual triggers

jobs:
  crawl:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip' # Optional but speeds up runs
          
      - name: Install dependencies
        run: pip install -r crawler/requirements.txt
        
      - name: Execute Crawler
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SUBSTACK_COOKIE: ${{ secrets.SUBSTACK_COOKIE }}
        run: |
          # Ensure pythonpath is set so modules can import from crawler.*
          export PYTHONPATH="."
          python crawler/main.py
          
      - name: Commit and push seen_articles cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add crawler/seen_articles.json
          git diff --staged --quiet || git commit -m "chore: update seen_articles cache"
          git push

      - name: Notify Discord on Workflow Failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            curl -H "Content-Type: application/json" \
                 -d '{
                      "embeds": [{
                        "title": "🔴 Crawler Workflow Crashed",
                        "description": "The GitHub Actions workflow failed to execute properly. [View Run Details](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})",
                        "color": 15158332
                      }]
                    }' \
                 $DISCORD_WEBHOOK_URL
          fi
